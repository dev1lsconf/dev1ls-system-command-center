server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Bloquear archivos ocultos y scripts
    location ~ /\.(git|py|sh) {
        deny all;
        return 404;
    }

    # Bloquear archivos de configuración y logs
    location ~ \.(json|log|conf)$ {
        deny all;
        return 404;
    }

    # Servir archivos estáticos con cache corto
    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 15m;
        add_header Cache-Control "public";
    }

    # Página principal
    location / {
        try_files $uri $uri/ =404;
    }
}
